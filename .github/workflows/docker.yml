name: Docker CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  docker-ci:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
      DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for containers..."
          sleep 10
          docker compose ps

      - name: Check containers are running
        run: |
          if [ "$(docker compose ps -q | wc -l)" -lt 2 ]; then
            echo "Not all containers are running"
            docker compose logs
            exit 1
          fi

      - name: Check for container crashes
        run: |
          for container in $(docker compose ps -q); do
            status=$(docker inspect -f '{{.State.Status}}' $container)
            if [ "$status" != "running" ]; then
              echo "Container $container is not running"
              docker logs $container
              exit 1
            fi
          done

      - name: Health check for frontend
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost/ >/dev/null; then
              echo "frontend ready"
              break
            fi
            echo "waiting frontend... attempt $i"
            sleep 2
          done

          if ! curl -fs http://localhost/ >/dev/null; then
            echo "frontend failed"
            docker compose logs frontend
            exit 1
          fi

      - name: Health check for backend
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost/api/ >/dev/null; then
              echo "backend ready"
              break
            fi
            echo "waiting backend... attempt $i"
            sleep 2
          done

          if ! curl -fs http://localhost/api/ >/dev/null; then
            echo "backend failed"
            docker compose logs backend
            exit 1
          fi

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down