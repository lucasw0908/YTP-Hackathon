name: Docker CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  docker-ci:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose --env-file .env up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for containers..."
          sleep 10
          docker compose ps

      - name: Check containers are running
        run: |
          if [ "$(docker compose ps -q | wc -l)" -lt 2 ]; then
            echo "Not all containers are running"
            docker compose logs
            exit 1
          fi

      - name: Check for container crashes
        run: |
          for container in $(docker compose ps -q); do
            status=$(docker inspect -f '{{.State.Status}}' $container)
            if [ "$status" != "running" ]; then
              echo "Container $container is not running"
              docker logs $container
              exit 1
            fi
          done

      - name: Health check (HTTP endpoints)
        run: |
          curl -f http://localhost:5173 || exit 1   # frontend
          curl -f http://localhost:8080 || exit 1   # backend

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down